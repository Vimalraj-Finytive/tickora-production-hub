[theme]
base            = "dark"
primaryColor    = "#0d42abff"
backgroundColor = "#0D1117"
secondaryBackgroundColor = "#161B22"
textColor       = "#E6EDF3"
font            = "sans serif"

[server]
headless            = true
port                = 8501
address             = "0.0.0.0"
enableCORS          = false
enableXsrfProtection = true
maxUploadSize       = 10

[browser]
gatherUsageStats = false
serverAddress    = "localhost"
serverPort       = 8501

[runner]
fastReruns = true
